# Copy to config.toml in BRAIN_DIR (default: the directory you run `brain` from).

# Trusted users; `brain migrate` seeds personal:<user> spaces + shared from this table.
# telegram = numeric Telegram user id (or @handle) — the skill maps senders to users with it.
# (A bare list also works: users = ["alice", "bob"] — no Telegram mapping then.)
[users.alice]
telegram = "111111111"

[users.bob]
telegram = "222222222"

[embeddings]
# Any litellm-supported embedding model. Needs that provider's key in the environment
# (e.g. OPENAI_API_KEY) — OpenRouter has no embeddings endpoint. api_base optional.
model = "openai/text-embedding-3-small"
# api_base = ""

[notion]
# Internal integration token (ntn_...). Share each space's database with the integration.
token = "ntn_your_token_here"

[drive]
# OAuth user token JSON, relative to BRAIN_DIR. See README/SETUP for the one-time consent flow.
token_path = "drive-token.json"
